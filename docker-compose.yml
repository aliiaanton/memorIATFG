services:
  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

  backend:
    build:
      context: ./backend
    depends_on:
      - ai-service
    ports:
      - "8080:8080"
    environment:
      APP_STORE: ${APP_STORE:-memory}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-false}
      APP_DEMO_CAREGIVER_ID: ${APP_DEMO_CAREGIVER_ID:-00000000-0000-0000-0000-000000000001}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
